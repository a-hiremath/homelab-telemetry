services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  postgres:
    image: postgres:16
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  ingester:
    build: ./ingester
    container_name: homelab-ingester
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_EVENTS_TOPIC: ${MQTT_EVENTS_TOPIC}
      MQTT_DEADLETTER_TOPIC: ${MQTT_DEADLETTER_TOPIC}
      ACK_TEMPLATE: ${ACK_TEMPLATE}
      DEVICE_DEFAULT_TZ: ${DEVICE_DEFAULT_TZ:-UTC}

      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}

  oura_poller:
    build: ./oura_poller
    container_name: homelab-oura-poller
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OURA_PAT: ${OURA_PAT}
      OURA_BACKFILL_START: ${OURA_BACKFILL_START:-2026-01-01}
      LOCAL_TZ: ${LOCAL_TZ:-America/Los_Angeles}
      OURA_CHUNK_DAYS: ${OURA_CHUNK_DAYS:-14}
      OURA_LOOKBACK_DAYS: ${OURA_LOOKBACK_DAYS:-3}

  derive_features:
    build: ./derive_features
    container_name: homelab-derive-features
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOCAL_TZ: ${LOCAL_TZ:-America/Los_Angeles}
      PERSONAL_SLEEP_NEED_H: ${PERSONAL_SLEEP_NEED_H:-7.5}
      PROCESS_S_TAU_W: ${PROCESS_S_TAU_W:-18.0}
      PROCESS_S_TAU_S: ${PROCESS_S_TAU_S:-4.5}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pgdata:
  grafana_data:
